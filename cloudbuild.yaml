# VaidyaBridge — Google Cloud Build CI/CD Pipeline
# Runs: lint check → unit tests → build container → deploy to Cloud Run
steps:

  # Step 1: Install dependencies
  - name: 'python:3.11-slim'
    id: 'install-deps'
    entrypoint: pip
    args: ['install', '--no-cache-dir', '-r', 'requirements.txt', '--user']

  # Step 2: Run unit tests with coverage
  - name: 'python:3.11-slim'
    id: 'run-tests'
    entrypoint: bash
    args:
      - '-c'
      - |
        export PATH=/root/.local/bin:$PATH
        pip install --no-cache-dir -r requirements.txt -q
        python -m pytest tests/ -v --tb=short -x
    waitFor: ['install-deps']

  # Step 3: Build container image (only if tests pass)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vaidya-bridge:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vaidya-bridge:latest'
      - '.'
    waitFor: ['run-tests']

  # Step 4: Push container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/vaidya-bridge']
    waitFor: ['build-image']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vaidya-bridge'
      - '--image=gcr.io/$PROJECT_ID/vaidya-bridge:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=120'
      - '--set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY,GOOGLE_MAPS_API_KEY=$$MAPS_API_KEY'
    secretEnv: ['GEMINI_API_KEY', 'MAPS_API_KEY']
    waitFor: ['push-image']

images:
  - 'gcr.io/$PROJECT_ID/vaidya-bridge:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/vaidya-bridge:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/maps-api-key/versions/latest
      env: 'MAPS_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
